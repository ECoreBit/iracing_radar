# iRacing 雷达设置 / iRacing Radar Settings
# SimHub 运行时可直接保存此文件，插件会在约 1 秒内自动重新读取。
# You may save this file while SimHub is running; the plugin reloads it in about one second.

# 前后车辆数值与触发模式：None=不显示数值，Distance=仅距离，Time=仅时间差，Both=两者。
# Front/rear value and trigger mode: None=no values, Distance=distance only, Time=time gap only, Both=both values.
# Distance 仅按 RadarRangeMeters 提示；Time 仅按 TimeAlertSeconds 提示。
# Distance uses only RadarRangeMeters; Time uses only TimeAlertSeconds.
# Both 和 None 均在距离或时间差任一条件达到时显示图形；None 只隐藏文字，不隐藏雷达图形。
# Both and None show the graphical alert when either threshold is met; None hides only the text values.
DisplayMode=Both

# 距离触发阈值（米），有效范围 5–200。
# Distance trigger threshold in meters; valid range: 5–200.
# 距离范围最外侧 15% 用于按比例渐显；其余范围完全显示。
# The outermost 15% of the distance range is used for proportional fade-in; the rest is fully visible.
RadarRangeMeters=70

# 红色近距离警示的起始距离（米），有效范围 1–100，且不会超过 RadarRangeMeters。
# Start of the red near-warning zone in meters; valid range: 1–100 and never above RadarRangeMeters.
NearDistanceMeters=20

# 是否显示前方绿色远距离提示条：true=显示，false=隐藏。
# Show the front green far-distance arc: true=shown, false=hidden.
FrontGreenArcEnabled=true

# 是否显示后方绿色远距离提示条：true=显示，false=隐藏。
# Show the rear green far-distance arc: true=shown, false=hidden.
RearGreenArcEnabled=true

# 时间差触发阈值（秒），有效范围 0.1–30。
# Time-gap trigger threshold in seconds; valid range: 0.1–30.
TimeAlertSeconds=0.7

# 雷达进入或离开提示范围时用于透明度变化的比例（%），有效范围 1–50；不改变触发值。
# Percentage of the alert-range edge used for radar opacity transition; valid range: 1–50; does not change trigger values.
RadarFadeBandPercent=15

# 前后车辆数值字体大小，有效范围 10–36。
# Front/rear value font size; valid range: 10–36.
LabelFontSize=22

# 整体雷达不透明度：0=不可见，100=完全不透明。
# Overall radar opacity: 0=invisible, 100=fully opaque.
OverlayOpacity=92